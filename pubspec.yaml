name: artesanias_andinas
description: >
  App de gestión de productos artesanales andinos – SIS048 Desarrollo de Software II
  Unidad II: Clean Architecture + Inversión de Control con get_it

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ═══════════════════════════════════════════════════════════════
  # INYECCIÓN DE DEPENDENCIAS
  # ═══════════════════════════════════════════════════════════════
  get_it: ^7.7.0

  # ═══════════════════════════════════════════════════════════════
  # GESTIÓN DE ESTADO
  # ═══════════════════════════════════════════════════════════════
  flutter_riverpod: ^2.5.1

  # ═══════════════════════════════════════════════════════════════
  # NAVEGACIÓN
  # ═══════════════════════════════════════════════════════════════
  go_router: ^14.6.3

  # ═══════════════════════════════════════════════════════════════
  # RED / HTTP
  # ═══════════════════════════════════════════════════════════════
  dio: ^5.7.0
  connectivity_plus: ^6.1.3

  # ═══════════════════════════════════════════════════════════════
  # PERSISTENCIA LOCAL con Drift (Lab 11)
  # ═══════════════════════════════════════════════════════════════
  drift: ^2.22.1                    # ORM reactivo sobre SQLite
  drift_flutter: ^0.2.4             # Integración Flutter nativa
  sqlite3_flutter_libs: ^0.5.24     # Binarios SQLite para Android/iOS
  path_provider: ^2.1.4             # Para obtener directorios de la app
  path: ^1.9.0                      # Manipulación de rutas

  # ═══════════════════════════════════════════════════════════════
  # SEGURIDAD / CIFRADO (Lab 12)
  # ═══════════════════════════════════════════════════════════════
  flutter_secure_storage: ^9.2.2    # Keychain (iOS) + Keystore (Android)
  encrypt: ^5.0.3                   # AES-256 para campos en SQLite
  crypto: ^3.0.3                    # SHA-256 para hashing

  # ═══════════════════════════════════════════════════════════════
  # UTILIDADES
  # ═══════════════════════════════════════════════════════════════
  equatable: ^2.0.5                 # Value equality
  dartz: ^0.10.1                    # Programación funcional (Either)

  # ═══════════════════════════════════════════════════════════════
  # UI
  # ═══════════════════════════════════════════════════════════════
  cached_network_image: ^3.4.1      # Caché de imágenes de red
  sqflite: ^2.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^4.0.0             # Reglas de linting
  
  # ═══════════════════════════════════════════════════════════════
  # GENERADORES DE CÓDIGO (Lab 11)
  # ═══════════════════════════════════════════════════════════════
  drift_dev: ^2.31.0                # Generador de código Drift
  build_runner: ^2.13.1              # Ejecutor de generadores

# ═══════════════════════════════════════════════════════════════
# CONFIGURACIÓN DE FLUTTER
# ═══════════════════════════════════════════════════════════════
flutter:
  uses-material-design: true
  
  # Assets (si tienes imágenes locales)
  # assets:
  #   - assets/images/
  #   - assets/icons/
  
  # Fuentes personalizadas (si las usas)
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic